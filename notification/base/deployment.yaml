apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: seungjo02/hospital-notification:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
          env:
            - name: RABBITMQ_HOST
              value: rabbitmq-service
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 20
            periodSeconds: 10
