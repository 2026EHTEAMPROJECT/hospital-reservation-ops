apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: user-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/2026EHTEAMPROJECT/hospital-reservation-ops.git
    targetRevision: HEAD
    path: user/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: hospital-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
