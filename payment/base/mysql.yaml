apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: payment-mysql-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-mysql
  labels:
    app: payment-mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-mysql
  template:
    metadata:
      labels:
        app: payment-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password
            - name: MYSQL_DATABASE
              value: hospital_payment
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: payment-mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: payment-mysql
  labels:
    app: payment-mysql
spec:
  type: ClusterIP
  selector:
    app: payment-mysql
  ports:
    - port: 3306
      targetPort: 3306
